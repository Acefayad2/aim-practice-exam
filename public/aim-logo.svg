<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" width="320" height="120">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#00000030"/>
    </filter>
  </defs>

  <!-- AIM letters -->
  <text x="160" y="96" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="100" font-weight="bold" font-style="italic"
    fill="#888888"
    stroke="#5B2D8E" stroke-width="3"
    filter="url(#shadow)"
    letter-spacing="-2">AIM</text>

  <!-- Crosshair circle -->
  <circle cx="160" cy="60" r="46" fill="none" stroke="#1a0a2e" stroke-width="4"/>
  <circle cx="160" cy="60" r="44" fill="none" stroke="#5B2D8E" stroke-width="2"/>

  <!-- Crosshair lines -->
  <line x1="160" y1="1" x2="160" y2="114" stroke="#1a0a2e" stroke-width="4"/>
  <line x1="160" y1="1" x2="160" y2="114" stroke="#5B2D8E" stroke-width="2"/>
  <line x1="1" y1="60" x2="319" y2="60" stroke="#1a0a2e" stroke-width="4"/>
  <line x1="1" y1="60" x2="319" y2="60" stroke="#5B2D8E" stroke-width="2"/>

  <!-- Red center dot -->
  <circle cx="160" cy="60" r="9" fill="#CC0000" stroke="#880000" stroke-width="1.5"/>
</svg>
